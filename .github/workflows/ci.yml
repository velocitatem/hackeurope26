name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  webapp:
    name: Next.js build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/webapp/package-lock.json
      - name: Install dependencies
        working-directory: apps/webapp
        run: npm ci
      - name: Type check
        working-directory: apps/webapp
        run: npm run typecheck

  python:
    name: Python lint + import check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install ruff python-dotenv
      - name: Lint
        run: ruff check src/ ml/ apps/worker/ apps/backend/ lib/ || true
      - name: Import smoke test
        run: |
          python -c "from lib.logger import get_logger; print('logger ok')"
          python -c "from lib.scraper import ScraperCache; print('scraper ok')" || true
