<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SUSTAIN – Logo</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #050A08;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      flex-direction: column;
      gap: 48px;
      padding: 60px 40px;
    }
    .label {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px;
      color: #2A4035;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-top: 12px;
      text-align: center;
    }
    .wrap { display: flex; gap: 60px; align-items: flex-start; flex-wrap: wrap; justify-content: center; }
    .card { display: flex; flex-direction: column; align-items: center; }
  </style>
</head>
<body>

<div class="wrap">

  <!-- DARK VERSION -->
  <div class="card">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 310" width="560" height="310">
      <defs>
        <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
          <feGaussianBlur stdDeviation="3.5" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glow-sm" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="1.8" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="chip-shadow">
          <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#00FF66" flood-opacity="0.6"/>
        </filter>

        <!-- Surplus area fill (between the two curves) -->
        <!-- Production curve (top bell): M 30,220  C 120,220 160,60 280,55  C 400,50 440,220 530,220 -->
        <!-- Demand curve (lower bell):   M 30,220  C 100,220 170,140 280,135 C 390,130 460,220 530,220 -->
        <!-- Surplus fill = production curve top, demand curve bottom -->
        <clipPath id="surplus-clip">
          <path d="M 30,220
                   C 120,220 160,60 280,55
                   C 400,50 440,220 530,220
                   C 460,220 390,130 280,135
                   C 170,140 100,220 30,220 Z"/>
        </clipPath>

        <!-- Text path along the demand curve for "SUSTAIN" -->
        <path id="demand-text-path"
              d="M 55,218 C 130,218 175,138 280,133 C 385,128 455,218 510,218"/>
      </defs>

      <!-- ── SURPLUS FILL ZONE ── -->
      <path d="M 30,220
               C 120,220 160,60 280,55
               C 400,50 440,220 530,220
               C 460,220 390,130 280,135
               C 170,140 100,220 30,220 Z"
            fill="#00FF66" fill-opacity="0.06"/>

      <!-- ── PRODUCTION CURVE (upper bell — energy supply) ── -->
      <path d="M 30,220 C 120,220 160,60 280,55 C 400,50 440,220 530,220"
            fill="none"
            stroke="#00FF66" stroke-width="2.6" stroke-linecap="round"
            filter="url(#glow)"/>

      <!-- ── DEMAND CURVE (lower bell — energy demand) ── -->
      <path d="M 30,220 C 100,220 170,140 280,135 C 390,130 460,220 530,220"
            fill="none"
            stroke="#00FF66" stroke-width="2.2" stroke-linecap="round"
            stroke-opacity="0.65"
            filter="url(#glow-sm)"/>

      <!-- ── GPU CHIP at peak of surplus (center top of gap, ~280,90) ── -->
      <g transform="translate(280, 92)" filter="url(#chip-shadow)">
        <!-- Chip body -->
        <rect x="-20" y="-20" width="40" height="40" rx="5"
              fill="#050A08" stroke="#00FF66" stroke-width="1.8"/>
        <!-- Inner die -->
        <rect x="-12" y="-12" width="24" height="24" rx="2.5"
              fill="#0A1A10" stroke="#00FF66" stroke-width="0.9" stroke-opacity="0.5"/>
        <!-- Grid lines -->
        <line x1="-12" y1="-4" x2="12" y2="-4" stroke="#00FF66" stroke-width="0.6" opacity="0.45"/>
        <line x1="-12" y1="4"  x2="12" y2="4"  stroke="#00FF66" stroke-width="0.6" opacity="0.45"/>
        <line x1="-4" y1="-12" x2="-4" y2="12" stroke="#00FF66" stroke-width="0.6" opacity="0.45"/>
        <line x1="4"  y1="-12" x2="4"  y2="12" stroke="#00FF66" stroke-width="0.6" opacity="0.45"/>
        <!-- Pins top -->
        <rect x="-12" y="-25" width="3.5" height="6" rx="1" fill="#00FF66"/>
        <rect x="-2"  y="-25" width="3.5" height="6" rx="1" fill="#00FF66"/>
        <rect x="8"   y="-25" width="3.5" height="6" rx="1" fill="#00FF66"/>
        <!-- Pins bottom -->
        <rect x="-12" y="19" width="3.5" height="6" rx="1" fill="#00FF66"/>
        <rect x="-2"  y="19" width="3.5" height="6" rx="1" fill="#00FF66"/>
        <rect x="8"   y="19" width="3.5" height="6" rx="1" fill="#00FF66"/>
        <!-- Pins left -->
        <rect x="-25" y="-12" width="6" height="3.5" rx="1" fill="#00FF66"/>
        <rect x="-25" y="-2"  width="6" height="3.5" rx="1" fill="#00FF66"/>
        <rect x="-25" y="8"   width="6" height="3.5" rx="1" fill="#00FF66"/>
        <!-- Pins right -->
        <rect x="19" y="-12" width="6" height="3.5" rx="1" fill="#00FF66"/>
        <rect x="19" y="-2"  width="6" height="3.5" rx="1" fill="#00FF66"/>
        <rect x="19" y="8"   width="6" height="3.5" rx="1" fill="#00FF66"/>
        <!-- Center glow dot -->
        <circle cx="0" cy="0" r="4" fill="#00FF66" filter="url(#glow)"/>
      </g>

      <!-- ── SUSTAIN straight below both curves ── -->
      <text x="280" y="218"
            font-family="'Space Grotesk', 'Arial Black', sans-serif"
            font-weight="700"
            font-size="54"
            fill="#00FF66"
            filter="url(#glow-sm)"
            opacity="0.95"
            text-anchor="middle"
            letter-spacing="8">
        SUSTAIN
      </text>

    </svg>
    <p class="label">Dark</p>
  </div>

  <!-- LIGHT VERSION -->
  <div class="card">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 310" width="560" height="310">
      <defs>
        <filter id="glow-l" x="-30%" y="-30%" width="160%" height="160%">
          <feGaussianBlur stdDeviation="2" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <path id="demand-text-path-l"
              d="M 55,218 C 130,218 175,138 280,133 C 385,128 455,218 510,218"/>
      </defs>

      <rect width="560" height="310" rx="16" fill="#F5FBF7"/>

      <!-- Surplus fill -->
      <path d="M 30,220
               C 120,220 160,60 280,55
               C 400,50 440,220 530,220
               C 460,220 390,130 280,135
               C 170,140 100,220 30,220 Z"
            fill="#00BB44" fill-opacity="0.08"/>

      <!-- Production curve -->
      <path d="M 30,220 C 120,220 160,60 280,55 C 400,50 440,220 530,220"
            fill="none" stroke="#00882E" stroke-width="2.6" stroke-linecap="round"/>

      <!-- Demand curve -->
      <path d="M 30,220 C 100,220 170,140 280,135 C 390,130 460,220 530,220"
            fill="none" stroke="#00882E" stroke-width="2.2" stroke-linecap="round" stroke-opacity="0.55"/>

      <!-- GPU Chip -->
      <g transform="translate(280, 92)">
        <rect x="-20" y="-20" width="40" height="40" rx="5" fill="white" stroke="#00882E" stroke-width="1.8"/>
        <rect x="-12" y="-12" width="24" height="24" rx="2.5" fill="#F0FFF5" stroke="#00882E" stroke-width="0.9" stroke-opacity="0.45"/>
        <line x1="-12" y1="-4" x2="12" y2="-4" stroke="#00882E" stroke-width="0.6" opacity="0.4"/>
        <line x1="-12" y1="4"  x2="12" y2="4"  stroke="#00882E" stroke-width="0.6" opacity="0.4"/>
        <line x1="-4" y1="-12" x2="-4" y2="12" stroke="#00882E" stroke-width="0.6" opacity="0.4"/>
        <line x1="4"  y1="-12" x2="4"  y2="12" stroke="#00882E" stroke-width="0.6" opacity="0.4"/>
        <rect x="-12" y="-25" width="3.5" height="6" rx="1" fill="#00882E"/>
        <rect x="-2"  y="-25" width="3.5" height="6" rx="1" fill="#00882E"/>
        <rect x="8"   y="-25" width="3.5" height="6" rx="1" fill="#00882E"/>
        <rect x="-12" y="19" width="3.5" height="6" rx="1" fill="#00882E"/>
        <rect x="-2"  y="19" width="3.5" height="6" rx="1" fill="#00882E"/>
        <rect x="8"   y="19" width="3.5" height="6" rx="1" fill="#00882E"/>
        <rect x="-25" y="-12" width="6" height="3.5" rx="1" fill="#00882E"/>
        <rect x="-25" y="-2"  width="6" height="3.5" rx="1" fill="#00882E"/>
        <rect x="-25" y="8"   width="6" height="3.5" rx="1" fill="#00882E"/>
        <rect x="19" y="-12" width="6" height="3.5" rx="1" fill="#00882E"/>
        <rect x="19" y="-2"  width="6" height="3.5" rx="1" fill="#00882E"/>
        <rect x="19" y="8"   width="6" height="3.5" rx="1" fill="#00882E"/>
        <circle cx="0" cy="0" r="4" fill="#00882E"/>
      </g>

      <!-- SUSTAIN text straight below -->
      <text x="280" y="218"
            font-family="'Space Grotesk', 'Arial Black', sans-serif"
            font-weight="700" font-size="54" fill="#00882E" opacity="0.92"
            text-anchor="middle" letter-spacing="8">
        SUSTAIN
      </text>
    </svg>
    <p class="label" style="color:#7AAA88;">Light</p>
  </div>

</div>
</body>
</html>
