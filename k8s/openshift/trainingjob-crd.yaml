apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: trainingjobs.energy.io
spec:
  group: energy.io
  scope: Namespaced
  names:
    plural: trainingjobs
    singular: trainingjob
    kind: TrainingJob
    shortNames:
      - tj
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                durationSeconds:
                  type: integer
                gpuCount:
                  type: integer
                minGpuMemoryMib:
                  type: integer
                allowedGeos:
                  type: array
                  items:
                    type: string
                evalEveryNEpochs:
                  type: integer
                migrationThreshold:
                  type: number
                migrationCooldownSeconds:
                  type: integer
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
      subresources:
        status: {}
